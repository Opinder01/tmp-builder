<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Horizontal road -->
  <rect x="5" y="21" width="54" height="14" rx="3.5" fill="url(#road)"/>

  <!-- Vertical road going down (T-shape) -->
  <rect x="25" y="21" width="14" height="36" rx="3.5" fill="url(#road)"/>

  <!-- Yellow dashes on horizontal road (left side) -->
  <rect x="8"  y="27" width="7" height="2" rx="1" fill="#fbbf24"/>
  <rect x="18" y="27" width="3" height="2" rx="1" fill="#fbbf24"/>

  <!-- Yellow dashes on horizontal road (right side) -->
  <rect x="43" y="27" width="3" height="2" rx="1" fill="#fbbf24"/>
  <rect x="49" y="27" width="7" height="2" rx="1" fill="#fbbf24"/>

  <!-- Yellow dashes on vertical road -->
  <rect x="31" y="40" width="2" height="5" rx="1" fill="#fbbf24"/>
  <rect x="31" y="49" width="2" height="5" rx="1" fill="#fbbf24"/>

  <!-- Orange glowing marker dot at intersection -->
  <circle cx="32" cy="28" r="6" fill="#f97316" opacity="0.25"/>
  <circle cx="32" cy="28" r="4" fill="#f97316"/>
  <circle cx="32" cy="28" r="2" fill="#fff7ed"/>

  <!-- Small white highlight top-left for depth -->
  <rect x="8" y="6" width="18" height="3" rx="1.5" fill="white" opacity="0.07"/>
</svg>
