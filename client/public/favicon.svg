<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#990000"/>
    </linearGradient>
  </defs>

  <!-- Canadian red rounded square background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- White maple leaf + stem -->
  <path
    fill="white"
    d="
      M32,9
      L30,18 L22,15 L25.5,22.5
      L13,25 L19.5,30.5
      L9,41 L21,38.5
      L19.5,49 L32,44
      L44.5,49 L43,38.5
      L55,41 L44.5,30.5
      L51,25 L38.5,22.5
      L42,15 L34,18
      Z
      M30,44 L30,57 L34,57 L34,44 Z
    "
  />

  <!-- Dark road strip across the bottom of the leaf area -->
  <rect x="8" y="50" width="48" height="7" rx="3.5" fill="#1e293b"/>

  <!-- Yellow dashed centre line on road -->
  <rect x="11" y="52.5" width="7"  height="2" rx="1" fill="#fbbf24"/>
  <rect x="22" y="52.5" width="4"  height="2" rx="1" fill="#fbbf24"/>
  <rect x="30" y="52.5" width="4"  height="2" rx="1" fill="#fbbf24"/>
  <rect x="38" y="52.5" width="4"  height="2" rx="1" fill="#fbbf24"/>
  <rect x="46" y="52.5" width="7"  height="2" rx="1" fill="#fbbf24"/>
</svg>
